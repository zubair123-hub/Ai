<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire Style Aim System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .game-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080"><rect fill="%23000a1f" width="1920" height="1080"/></svg>');
            background-size: cover;
        }

        /* Crosshair/Aim System */
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            pointer-events: none;
            z-index: 100;
        }

        .crosshair-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #00ff00, #00cc00);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        }

        .crosshair-line {
            position: absolute;
            background: linear-gradient(to right, transparent, #00ff00, transparent);
            opacity: 0.7;
        }

        .crosshair-h {
            width: 40px;
            height: 2px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .crosshair-v {
            width: 2px;
            height: 40px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .crosshair-corner {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #00ff00;
            opacity: 0.9;
        }

        .corner-top-left {
            top: 5px;
            left: 5px;
        }

        .corner-top-right {
            top: 5px;
            right: 5px;
        }

        .corner-bottom-left {
            bottom: 5px;
            left: 5px;
        }

        .corner-bottom-right {
            bottom: 5px;
            right: 5px;
        }

        /* HUD Elements */
        .hud-container {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Health Bar */
        .health-bar {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 300px;
            z-index: 50;
        }

        .health-label {
            color: #00ff00;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .health-bar-bg {
            width: 100%;
            height: 30px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ff00;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        .health-bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #00ff00, #00cc00);
            box-shadow: inset 0 0 10px rgba(0, 255, 0, 0.5);
            animation: healthPulse 2s ease-in-out infinite;
        }

        @keyframes healthPulse {
            0%, 100% { box-shadow: inset 0 0 10px rgba(0, 255, 0, 0.5); }
            50% { box-shadow: inset 0 0 20px rgba(0, 255, 0, 0.8); }
        }

        /* Ammo Counter */
        .ammo-counter {
            position: absolute;
            bottom: 30px;
            right: 30px;
            color: #00ff00;
            text-align: right;
            z-index: 50;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .ammo-label {
            font-size: 14px;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .ammo-count {
            font-size: 48px;
            font-weight: bold;
            line-height: 1;
        }

        .ammo-count span {
            font-size: 24px;
            opacity: 0.7;
        }

        /* Weapon Info */
        .weapon-info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #00ff00;
            text-align: center;
            font-size: 16px;
            z-index: 50;
            border: 2px solid #00ff00;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        /* Minimap */
        .minimap {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 200px;
            height: 200px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ff00;
            border-radius: 5px;
            overflow: hidden;
            z-index: 50;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        .minimap-content {
            width: 100%;
            height: 100%;
            position: relative;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect fill="%23001a00" width="200" height="200"/></svg>');
        }

        .minimap-player {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #00ff00;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.8);
        }

        .minimap-enemy {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ff0000;
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(255, 0, 0, 0.8);
        }

        /* Scope Overlay */
        .scope-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 3px solid #00ff00;
            background: radial-gradient(circle, rgba(0, 255, 0, 0.1), rgba(0, 255, 0, 0.05));
            opacity: 0;
            pointer-events: none;
            z-index: 99;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            transition: opacity 0.3s ease;
        }

        .scope-overlay.active {
            opacity: 1;
        }

        /* Damage Indicator */
        .damage-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            pointer-events: none;
            z-index: 90;
        }

        .damage-direction {
            position: absolute;
            width: 30px;
            height: 30px;
            background: rgba(255, 0, 0, 0.3);
            border: 2px solid #ff0000;
            border-radius: 50%;
        }

        /* Status Indicators */
        .status-indicators {
            position: absolute;
            top: 30px;
            left: 30px;
            display: flex;
            gap: 15px;
            z-index: 50;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #00ff00;
            font-size: 14px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00ff00;
            border-radius: 3px;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
        }

        .status-icon {
            width: 16px;
            height: 16px;
            background: #00ff00;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.8);
        }

        /* Radar Pulse */
        @keyframes radarPulse {
            0% {
                width: 10px;
                height: 10px;
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(0, 255, 0, 0.7);
            }
            100% {
                width: 50px;
                height: 50px;
                opacity: 0;
                box-shadow: 0 0 0 20px rgba(0, 255, 0, 0);
            }
        }

        .radar-pulse {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #00ff00;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: radarPulse 1.5s ease-out infinite;
        }

        /* Controls Info */
        .controls-info {
            position: absolute;
            top: 30px;
            right: 30px;
            color: #00ff00;
            font-size: 12px;
            opacity: 0.7;
            text-align: right;
            z-index: 40;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
        }

        .control-item {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- HUD -->
        <div class="hud-container">
            <!-- Status Indicators -->
            <div class="status-indicators">
                <div class="status-item">
                    <div class="status-icon"></div>
                    <span>Shield: 100</span>
                </div>
                <div class="status-item">
                    <div class="status-icon"></div>
                    <span>Level: 1</span>
                </div>
            </div>

            <!-- Controls Info -->
            <div class="controls-info">
                <div class="control-item">📱 Mouse: Aim</div>
                <div class="control-item">🔫 Click: Shoot</div>
                <div class="control-item">🔍 Scroll: Zoom</div>
                <div class="control-item">S: Toggle Scope</div>
            </div>

            <!-- Health Bar -->
            <div class="health-bar">
                <div class="health-label">HEALTH: 100/100</div>
                <div class="health-bar-bg">
                    <div class="health-bar-fill" id="healthFill"></div>
                </div>
            </div>

            <!-- Ammo Counter -->
            <div class="ammo-counter">
                <div class="ammo-label">AMMO</div>
                <div class="ammo-count"><span id="currentAmmo">30</span>/<span id="maxAmmo">120</span></div>
            </div>

            <!-- Weapon Info -->
            <div class="weapon-info" id="weaponInfo">
                AK-47 | DMG: 45 | RANGE: 45m
            </div>

            <!-- Minimap -->
            <div class="minimap">
                <div class="minimap-content">
                    <div class="radar-pulse"></div>
                    <div class="minimap-player"></div>
                    <div class="minimap-enemy" style="top: 30px; left: 40px;"></div>
                    <div class="minimap-enemy" style="top: 160px; left: 150px;"></div>
                </div>
            </div>
        </div>

        <!-- Crosshair -->
        <div class="crosshair" id="crosshair">
            <div class="crosshair-center"></div>
            <div class="crosshair-line crosshair-h"></div>
            <div class="crosshair-line crosshair-v"></div>
            <div class="crosshair-corner corner-top-left"></div>
            <div class="crosshair-corner corner-top-right"></div>
            <div class="crosshair-corner corner-bottom-left"></div>
            <div class="crosshair-corner corner-bottom-right"></div>
        </div>

        <!-- Scope Overlay -->
        <div class="scope-overlay" id="scopeOverlay"></div>

        <!-- Damage Indicator -->
        <div class="damage-indicator" id="damageIndicator"></div>
    </div>

    <script>
        // Aim System Script
        class AimSystem {
            constructor() {
                this.health = 100;
                this.maxHealth = 100;
                this.currentAmmo = 30;
                this.maxAmmo = 120;
                this.isScopedIn = false;
                this.sensitivity = 1;
                this.crosshair = document.getElementById('crosshair');
                this.scopeOverlay = document.getElementById('scopeOverlay');
                this.healthFill = document.getElementById('healthFill');
                this.damageIndicator = document.getElementById('damageIndicator');
                
                this.initEvents();
            }

            initEvents() {
                // Mouse move - track crosshair
                document.addEventListener('mousemove', (e) => this.handleMouseMove(e));

                // Click - shoot
                document.addEventListener('click', (e) => this.handleShoot(e));

                // Key press
                document.addEventListener('keydown', (e) => this.handleKeyPress(e));

                // Scroll - zoom
                document.addEventListener('wheel', (e) => this.handleScroll(e));

                // Simulate damage for demo
                setTimeout(() => this.simulateDamage(45), 3000);
                setTimeout(() => this.simulateDamage(20), 6000);
            }

            handleMouseMove(e) {
                const x = e.clientX;
                const y = e.clientY;
                
                this.crosshair.style.left = x + 'px';
                this.crosshair.style.top = y + 'px';
            }

            handleShoot(e) {
                if (this.currentAmmo > 0) {
                    this.currentAmmo--;
                    this.updateAmmo();
                    this.createMuzzleFlash(e.clientX, e.clientY);
                    this.createBulletImpact(e.clientX, e.clientY);
                }
            }

            handleKeyPress(e) {
                if (e.key.toLowerCase() === 's') {
                    this.toggleScope();
                }
                if (e.key === 'r' || e.key === 'R') {
                    this.reload();
                }
            }

            handleScroll(e) {
                e.preventDefault();
                // Zoom effect (visual simulation)
                const zoomLevel = e.deltaY > 0 ? 0.9 : 1.1;
                this.scopeOverlay.style.transform = `translate(-50%, -50%) scale(${zoomLevel})`;
            }

            toggleScope() {
                this.isScopedIn = !this.isScopedIn;
                this.scopeOverlay.classList.toggle('active');
            }

            reload() {
                this.currentAmmo = 30;
                this.updateAmmo();
            }

            updateAmmo() {
                document.getElementById('currentAmmo').textContent = this.currentAmmo;
            }

            updateHealth() {
                const percentage = (this.health / this.maxHealth) * 100;
                this.healthFill.style.width = percentage + '%';
                document.querySelector('.health-label').textContent = `HEALTH: ${this.health}/${this.maxHealth}`;
                
                // Change color based on health
                if (this.health <= 30) {
                    this.healthFill.style.background = 'linear-gradient(90deg, #ff0000, #cc0000)';
                } else if (this.health <= 60) {
                    this.healthFill.style.background = 'linear-gradient(90deg, #ffff00, #ffcc00)';
                } else {
                    this.healthFill.style.background = 'linear-gradient(90deg, #00ff00, #00cc00)';
                }
            }

            createMuzzleFlash(x, y) {
                const flash = document.createElement('div');
                flash.style.position = 'absolute';
                flash.style.left = x + 'px';
                flash.style.top = y + 'px';
                flash.style.width = '30px';
                flash.style.height = '30px';
                flash.style.background = 'radial-gradient(circle, #ffff00, #ff6600, transparent)';
                flash.style.borderRadius = '50%';
                flash.style.pointerEvents = 'none';
                flash.style.zIndex = '98';
                document.querySelector('.game-container').appendChild(flash);

                setTimeout(() => flash.remove(), 100);
            }

            createBulletImpact(x, y) {
                const impact = document.createElement('div');
                impact.style.position = 'absolute';
                impact.style.left = x + 'px';
                impact.style.top = y + 'px';
                impact.style.width = '20px';
                impact.style.height = '20px';
                impact.style.border = '2px solid #ff0000';
                impact.style.borderRadius = '50%';
                impact.style.pointerEvents = 'none';
                impact.style.zIndex = '97';
                impact.style.animation = 'impactFade 0.5s ease-out forwards';
                document.querySelector('.game-container').appendChild(impact);

                setTimeout(() => impact.remove(), 500);
            }

            simulateDamage(damage) {
                this.health -= damage;
                if (this.health < 0) this.health = 0;
                this.updateHealth();
                this.showDamageDirection();
            }

            showDamageDirection() {
                // Random direction
                const angle = Math.random() * 360;
                const damageMarker = document.createElement('div');
                damageMarker.style.position = 'absolute';
                damageMarker.style.width = '40px';
                damageMarker.style.height = '40px';
                damageMarker.style.top = '50%';
                damageMarker.style.left = '50%';
                damageMarker.style.transform = `translate(-50%, -50%) rotate(${angle}deg) translateY(-100px)`;
                damageMarker.style.border = '2px solid #ff0000';
                damageMarker.style.borderRadius = '50%';
                damageMarker.style.opacity = '1';
                damageMarker.style.pointerEvents = 'none';
                damageMarker.style.zIndex = '89';
                damageMarker.style.animation = 'damageFade 1s ease-out forwards';
                document.querySelector('.game-container').appendChild(damageMarker);

                setTimeout(() => damageMarker.remove(), 1000);
            }
        }

        // Add animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes impactFade {
                0% {
                    transform: scale(1);
                    opacity: 1;
                }
                100% {
                    transform: scale(1.5);
                    opacity: 0;
                }
            }

            @keyframes damageFade {
                0% {
                    opacity: 1;
                    transform: translate(-50%, -50%) rotate(0deg) translateY(-100px);
                }
                100% {
                    opacity: 0;
                    transform: translate(-50%, -50%) rotate(360deg) translateY(-150px);
                }
            }
        `;
        document.head.appendChild(style);

        // Initialize aim system
        const aimSystem = new AimSystem();
    </script>
</body>
</html>
